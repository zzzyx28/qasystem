# 轨道交通知识服务系统 - 全栈编排
# 使用：在仓库根目录 cp .env.example .env 并编辑后执行
#   docker compose up -d --build
#
# 可选 Neo4j（答案生成、图谱更新、抽取落库等）：
#   docker compose --profile neo4j up -d --build
# 然后在 .env 中设置 NEO4J_URI=bolt://neo4j:7687（与 NEO4J_AUTH 密码一致）

services:
  db:
    image: mysql:8.0
    container_name: railway_mysql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-rail_assistant}
      MYSQL_USER: ${MYSQL_USER:-rail}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-rail123}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      # 生产建议去掉 ports，仅容器内访问；开发可保留本机回环
      - "${MYSQL_BIND:-127.0.0.1}:3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 40s

  neo4j:
    profiles: ["neo4j"]
    image: neo4j:5-community
    container_name: railway_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4j2025}
    volumes:
      - neo4j_data:/data
    ports:
      - "${NEO4J_HTTP_BIND:-127.0.0.1}:7474:7474"
      - "${NEO4J_BOLT_BIND:-127.0.0.1}:7687:7687"
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: railway_backend
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      # Linux 上访问宿主机 Neo4j / Ollama / vLLM 等
      - "host.docker.internal:host-gateway"
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      ENVIRONMENT: ${ENVIRONMENT:-development}
      # 默认连 compose 内 db；若使用外部 MySQL，可在 .env 覆盖 DATABASE_HOST / DATABASE_PORT
      DATABASE_URL: mysql+asyncmy://${MYSQL_USER:-rail}:${MYSQL_PASSWORD:-rail123}@${DATABASE_HOST:-db}:${DATABASE_PORT:-3306}/${MYSQL_DATABASE:-rail_assistant}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      DIFY_API_URL: ${DIFY_API_URL:-}
      DIFY_API_KEY: ${DIFY_API_KEY:-}
      DIFY_KNOWLEDGE_API_KEY: ${DIFY_KNOWLEDGE_API_KEY:-}
      DIFY_USE_WORKFLOW: ${DIFY_USE_WORKFLOW:-false}
      DIFY_WORKFLOW_API_KEY: ${DIFY_WORKFLOW_API_KEY:-}
      DIFY_WORKFLOW_INPUT_VAR: ${DIFY_WORKFLOW_INPUT_VAR:-query}
      DIFY_WORKFLOW_OUTPUT_VAR: ${DIFY_WORKFLOW_OUTPUT_VAR:-text}
      DIFY_WORKFLOW_RESPONSE_MODE: ${DIFY_WORKFLOW_RESPONSE_MODE:-blocking}
      DIFY_WORKFLOW_TIMEOUT_SECONDS: ${DIFY_WORKFLOW_TIMEOUT_SECONDS:-120}
      # 图谱 / QA / 冲突检测等（容器内连 compose 中的 neo4j 或宿主机）
      NEO4J_URI: ${NEO4J_URI:-bolt://host.docker.internal:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j2025}
      # algorithm/conflict_detection 读取 CONFLICT_*，与 NEO4J_* 保持一致即可
      CONFLICT_NEO4J_URI: ${NEO4J_URI:-bolt://host.docker.internal:7687}
      CONFLICT_NEO4J_USER: ${NEO4J_USER:-neo4j}
      CONFLICT_NEO4J_PWD: ${NEO4J_PASSWORD:-neo4j2025}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      MILVUS_URI: ${MILVUS_URI:-}
      OLLAMA_URL: ${OLLAMA_URL:-}
    volumes:
      - backend_documents:/app/backend/data/documents
      - backend_preproc_output:/app/backend/data/preproc_output
      # 挂载宿主机模型目录到容器内 /models（只读，避免模型被容器进程修改）
      - ${HOST_MODELS_DIR:-/opt/qasystem-models}:/models:ro
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 240s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: railway_frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql_data:
  neo4j_data:
  backend_documents:
  backend_preproc_output:
